# DRBP Balanced Discharge Configuration
# Version: 1.0

# System Configuration
system:
  name: "DRBP Balanced Discharge System"
  version: "1.0.0"
  update_frequency_hz: 10
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  data_retention_days: 30

# Battery Configuration
battery:
  total_modules: 20
  cells_per_module: 16
  cell_capacity_ah: 50.0
  cell_nominal_voltage: 3.7
  cell_max_current_a: 150
  cell_min_soc: 0.05
  cell_max_soc: 0.95
  cell_max_temp_c: 60.0
  cell_min_temp_c: -10.0

# Vehicle Configuration
vehicle:
  default_mass_kg: 1800
  default_frontal_area_m2: 2.4
  default_drag_coefficient: 0.28
  default_rolling_resistance: 0.012
  default_efficiency: 0.92
  default_auxiliary_power_w: 500

# LLM Configuration
llm:
  provider: "openai"  # openai, anthropic, deepseek, mock
  model: "gpt-4"
  temperature: 0.1
  max_tokens: 1000
  timeout_seconds: 30
  fallback_on_failure: true
  cache_responses: true
  cache_ttl_minutes: 60

# Strategy Configuration
strategies:
  default_strategy: "equilibrium"
  min_cells_per_module: 1
  max_cells_per_module: 8
  weight_normalization: "softmax"  # softmax, linear, none
  
  # Strategy-specific parameters
  high_energy:
    cells_range: [3, 6]
    weights: {soc: 0.7, soh: 0.2, temperature: -0.1}
    
  equilibrium:
    cells_range: [4, 8]
    weights: {soc: 0.9, internal_resistance: -0.1}
    
  thermal_management:
    cells_range: [5, 8]
    weights: {temperature: 0.8, soc: 0.2}
    
  lifetime_optimization:
    cells_range: [3, 6]
    weights: {soh: 0.6, cycles: -0.3, soc: 0.1}
    
  minimum_cells:
    cells_range: [1, 4]
    weights: {soc: 0.5, internal_resistance: -0.3, soh: 0.2}

# Safety Configuration
safety:
  voltage_margin_percent: 5
  current_margin_percent: 10
  temperature_margin_c: 5
  soc_margin: 0.05
  max_reconfiguration_time_ms: 100
  fallback_strategy: "highest_soc"
  
  # Validation thresholds
  validation:
    min_voltage_per_cell: 3.0
    max_voltage_per_cell: 4.2
    max_current_per_cell: 150
    max_cell_temp: 60.0
    max_temp_gradient: 10.0
    max_soc_difference: 0.3

# Topology Configuration
topology:
  max_series_per_module: 4
  max_parallel_per_module: 4
  prefer_min_parallel: true
  voltage_tolerance_percent: 5
  current_tolerance_percent: 10

# Performance Configuration
performance:
  target_processing_time_ms: 100
  max_processing_time_ms: 500
  enable_historical_learning: true
  learning_window_cycles: 100
  optimization_frequency_cycles: 10

# Output Configuration
output:
  format: "json"
  include_debug_info: false
  save_to_file: true
  output_directory: "output"
  filename_template: "drbp_result_{timestamp}.json"
  max_files: 100

# Logging Configuration
logging:
  enable_file_logging: true
  log_directory: "logs"
  max_log_size_mb: 100
  log_rotation_days: 7
  log_levels:
    system: "INFO"
    battery: "INFO"
    strategy: "DEBUG"
    safety: "WARNING"
    topology: "INFO"

# Testing Configuration
testing:
  enable_mock_data: true
  mock_battery_file: "test_data/battery_state_example.json"
  mock_navigation_file: "test_data/navigation_example.json"
  test_power_levels_kw: [10, 20, 30, 40]
  test_duration_min: 10

# API Configuration (if applicable)
api:
  enable: false
  host: "0.0.0.0"
  port: 8080
  authentication_required: true
  rate_limit_requests_per_minute: 60

# Monitor Configuration
monitor:
  enable_dashboard: true
  dashboard_port: 3000
  refresh_interval_ms: 1000
  metrics_to_track:
    - "soc_convergence"
    - "temperature_gradient"
    - "current_balance"
    - "processing_time"
    - "strategy_effectiveness"